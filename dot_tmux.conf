set -g status off
run '~/.tmux/plugins/tpm/tpm'
set -g status-left-length 30
set -g status-right-length 120

# ========== POST-TPM THEME OVERRIDES ==========
# Keep exactly ONE block active (uncommented).

# --- TOKYO NIGHT (active) ---
# set -g status-left '#[fg=#2A2F41,bg=#7aa2f7,bold] #{?client_prefix,󰠠,󰤂} #{b:pane_current_path} #[default]'
set -g status-left ''
set -gF @home_host '#h'
set -g status-right '#[fg=#a9b1d6,bg=#1A1B26,bold] #{?client_prefix,,} #{b:pane_current_path}#{?#{!=:#h,#{@home_host}}, | #h,} #[default]'
setw -g window-status-current-format '#[fg=#a9b1d6,bg=#1A1B26,nobold,noitalics,nounderscore,nodim]#[fg=#1a1b26,bg=#95a3c4] #{?#{==:#{pane_current_command},ssh},,}#[fg=#1a1b26,bold,nodim]#(/home/leo/.tmux/plugins/tokyo-night-tmux/src/custom-number.sh #I none)#W#[nobold]#{?window_zoomed_flag, #(/home/leo/.tmux/plugins/tokyo-night-tmux/src/custom-number.sh #P hide), #(/home/leo/.tmux/plugins/tokyo-night-tmux/src/custom-number.sh #P hide)}#{?window_last_flag, , }'

