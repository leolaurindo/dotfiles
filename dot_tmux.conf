# Use Ctrl+a as prefix
unbind C-b
set -g prefix C-f
bind C-f send-prefix
set -g prefix2 C-Space

bind , command-prompt -I "#W" "rename-window '%%' \; set-option -w automatic-rename off \; set-option -w allow-rename off"

# Pane navigation: prefix + h/j/k/l
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r Tab select-pane -t :.+

# Pane resize: prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:RGB'
set -as terminal-features ',xterm*:sixel'
# or: 
# set -as terminal-overrides ',*:Tc'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# ==================== THEME BLOCKS ====================
# Keep exactly ONE block active (uncommented).

# --- TOKYO NIGHT (active) ---
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_theme night # storm | day | default to 'night'
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_show_wbg 0
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style hide
set -g @tokyo-night-tmux_zoom_id_style hide
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_terminal_icon none
set -g @tokyo-night-tmux_active_terminal_icon none

